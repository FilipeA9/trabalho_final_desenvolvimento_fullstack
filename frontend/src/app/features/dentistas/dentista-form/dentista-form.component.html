<div class="page">
  <h1 class="page-title">{{ isEdit ? 'Editar' : 'Novo' }} Dentista</h1>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="salvar()" class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="nome" placeholder="Nome completo">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>CRO</mat-label>
          <input matInput formControlName="cro" placeholder="CRO-XX 00000">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Especialidade</mat-label>
          <input matInput formControlName="especialidade" placeholder="Ex: Ortodontia">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Telefone</mat-label>
          <input matInput formControlName="telefone" placeholder="(00) 00000-0000">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="email@exemplo.com">
        </mat-form-field>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            <mat-icon>save</mat-icon> Salvar
          </button>
          <button mat-stroked-button routerLink="/dentistas" type="button">
            <mat-icon>cancel</mat-icon> Cancelar
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
