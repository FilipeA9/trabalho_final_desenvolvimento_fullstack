<div class="page">
  <div class="page-header">
    <h1 class="page-title">Dentistas</h1>
    <button mat-raised-button color="primary" routerLink="/dentistas/novo">
      <mat-icon>add</mat-icon> Novo Dentista
    </button>
  </div>

  <mat-card>
    <table mat-table [dataSource]="dentistas()" class="full-width">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let d">{{ d.id }}</td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let d">{{ d.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="cro">
        <th mat-header-cell *matHeaderCellDef>CRO</th>
        <td mat-cell *matCellDef="let d">{{ d.cro }}</td>
      </ng-container>

      <ng-container matColumnDef="especialidade">
        <th mat-header-cell *matHeaderCellDef>Especialidade</th>
        <td mat-cell *matCellDef="let d">{{ d.especialidade }}</td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let d">
          <button mat-icon-button color="primary" [routerLink]="['/dentistas/editar', d.id]">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="excluir(d.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
