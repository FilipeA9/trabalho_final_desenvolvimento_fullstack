<div class="page">
  <h1 class="page-title">Agendar Consulta</h1>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="salvar()" class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Paciente</mat-label>
          <mat-select formControlName="pacienteId">
            @for (p of pacientes; track p.id) {
              <mat-option [value]="p.id">{{ p.nome }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Dentista</mat-label>
          <mat-select formControlName="dentistaId">
            @for (d of dentistas; track d.id) {
              <mat-option [value]="d.id">{{ d.nome }} - {{ d.especialidade }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Data e Hora</mat-label>
          <input matInput type="datetime-local" formControlName="dataHora">
        </mat-form-field>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            <mat-icon>save</mat-icon> Agendar
          </button>
          <button mat-stroked-button routerLink="/consultas" type="button">
            <mat-icon>cancel</mat-icon> Cancelar
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
