<div class="page">
  <div class="page-header">
    <h1 class="page-title">Consultas</h1>
    <button mat-raised-button color="primary" routerLink="/consultas/novo">
      <mat-icon>add</mat-icon> Nova Consulta
    </button>
  </div>

  <mat-card>
    <table mat-table [dataSource]="consultas()" class="full-width">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let c">{{ c.id }}</td>
      </ng-container>

      <ng-container matColumnDef="pacienteNome">
        <th mat-header-cell *matHeaderCellDef>Paciente</th>
        <td mat-cell *matCellDef="let c">{{ c.pacienteNome }}</td>
      </ng-container>

      <ng-container matColumnDef="dentistaNome">
        <th mat-header-cell *matHeaderCellDef>Dentista</th>
        <td mat-cell *matCellDef="let c">{{ c.dentistaNome }}</td>
      </ng-container>

      <ng-container matColumnDef="dataHora">
        <th mat-header-cell *matHeaderCellDef>Data/Hora</th>
        <td mat-cell *matCellDef="let c">{{ c.dataHora }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let c">
          <mat-chip [color]="statusColors[c.status]" selected>{{ c.status }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let c">
          @if (c.status === 'AGENDADA') {
            <button mat-icon-button color="primary" (click)="concluir(c.id)" title="Concluir">
              <mat-icon>check_circle</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="cancelar(c.id)" title="Cancelar">
              <mat-icon>cancel</mat-icon>
            </button>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
